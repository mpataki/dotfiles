plugins:
  jqlogs:
    shortCut: Ctrl-J
    confirm: false
    description: "JSON formatted logs (stern)"
    scopes:
      - po
    command: bash
    background: false
    overwriteOutput: true
    args:
      - -c
      - >-
        stern $NAME --context $CONTEXT --namespace $NAMESPACE
        --since 10m --tail 100 --output raw --no-follow |
        jq -rR '. as $line | try (fromjson |
        (.time | split("T")[1] | split(".")[0]) as $ts |
        (.level // "???") as $lvl |
        (.message // "") as $msg |
        (.source // "") as $src |
        if $src != "" then "\($ts) \($lvl) \($msg)  source=\($src)"
        else "\($ts) \($lvl) \($msg)" end
        ) catch $line'
