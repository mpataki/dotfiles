plugins:
  jqlogs:
    shortCut: Ctrl-J
    confirm: false
    description: "JSON formatted logs"
    scopes:
      - po
    command: bash
    background: false
    overwriteOutput: true
    args:
      - -c
      - "kubectl logs -f $NAME --all-containers -n $NAMESPACE --context $CONTEXT | jq -rR '. as $line | try (fromjson | {time: (.time // .timestamp // \"\"), level: (.level // \"\"), msg: (.message // .fields.message // .msg // \"\"), source: (.source // .target // \"\")} | [.time, .level, .msg, .source] | map(select(. != \"\")) | join(\" | \")) catch $line'"
